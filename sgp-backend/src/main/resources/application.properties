
spring.config.import=optional:classpath:application-local.properties

# ===============================
# CONFIGURAÇÃO DO SERVIDOR
# ===============================
server.port=3000

# ===============================
# CONEXÃO COM O BANCO (NEON)
# ===============================
spring.datasource.url=jdbc:postgresql://ep-wandering-king-anhyjf3a-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CONFIGURAÇÕES DO JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 2. VERIFICAÇÃO: Certifique-se de que no arquivo local a chave seja exatamente JWT_SECRET_KEY
api.security.token.secret=${JWT_SECRET_KEY}